<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2C1810" />
    <title>BizTrack</title>
    
    <!-- Instant Theme Detection -->
    <script>
      (function() {
        const storage = localStorage.getItem('biztrack-storage');
        if (storage) {
          try {
            const isDark = JSON.parse(storage).state.isDarkMode;
            if (isDark) document.documentElement.classList.add('dark');
          } catch(e) {}
        }
      })();
    </script>

    <style>
      :root { --sp-bg: #FAF8F4; --sp-acc: #C17F5A; --sp-bord: #E0D6C8; }
      .dark { --sp-bg: #1A0E0A; --sp-acc: #E27D60; --sp-bord: #3D271D; }
      
      #splash-screen {
        position: fixed; inset: 0; background: var(--sp-bg);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease, visibility 0.4s;
      }
      .logo-box {
        width: 80px; height: 80px; background: var(--sp-acc); border-radius: 22px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 12px 30px rgba(0,0,0,0.15); margin-bottom: 30px;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      .loading-bar { width: 140px; height: 4px; background: var(--sp-bord); border-radius: 10px; overflow: hidden; }
      .loading-fill { 
        height: 100%; width: 40%; background: var(--sp-acc); border-radius: 10px;
        animation: slide 1.4s infinite ease-in-out; 
      }
      @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(250%); } }
      
      /* Hide splash when root is filled */
      body.app-loaded #splash-screen { opacity: 0; visibility: hidden; }
    </style>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
      (function(){
          emailjs.init({ publicKey: "dnWW8IiQzni2_D7eN" });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    
    <div id="splash-screen">
      <div class="logo-box">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      </div>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
